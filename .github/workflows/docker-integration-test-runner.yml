name: Docker Integration Test Runner

on:
  workflow_dispatch:
  schedule:
#    Weekly on Monday at 02:00 UTC (07.30 AM SL time)
    - cron:  '0 2 * * 1'


env:
  MAVEN_OPTS: -Dhttp.keepAlive=false -Dmaven.wagon.http.pool=false -Dmaven.wagon.http.retryHandler.class=standard -Dmaven.wagon.http.retryHandler.count=3


jobs:
  docker-integration-tests:
    runs-on: ubuntu-latest

    env:
      JAVA_TOOL_OPTIONS: "-Djdk.util.zip.disableZip64ExtraFieldValidation=true -Djdk.nio.zipfs.allowDotZipEntry=true"

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4
      - name: Set up Adopt JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: "11"
          distribution: "adopt"
      - name: Product-IS build with JDK 11 without Integration Tests
        run: |
          mvn clean install --batch-mode -Dmaven.test.skip=true | tee mvn-build.log
      - name: Set up Adopt JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
      - name: Run Docker-based Integration Tests with JDK 21
        run: |
          cd modules/integration/
          mvn clean install --batch-mode -DdockerTests | tee mvn-docker-build.log

          PR_BUILD_STATUS=$(cat mvn-docker-build.log | grep "\[INFO\] BUILD" | grep -oE '[^ ]+$')
          PR_TEST_RESULT=$(sed -n -e '/\[INFO\] Results:/,/\[INFO\] Tests run:/ p' mvn-docker-build.log)

          PR_BUILD_FINAL_RESULT=$(
            echo "==========================================================="
            echo "Docker Integration Tests BUILD $PR_BUILD_STATUS"
            echo "=========================================================="
            echo ""
            echo "$PR_TEST_RESULT"
          )

          PR_BUILD_RESULT_LOG_TEMP=$(echo "$PR_BUILD_FINAL_RESULT" | sed 's/$/%0A/')
          PR_BUILD_RESULT_LOG=$(echo $PR_BUILD_RESULT_LOG_TEMP)
          echo "::warning::$PR_BUILD_RESULT_LOG"

          # Check that the final BUILD result is SUCCESS (not a hardcoded count).
          if ! grep -q "\[INFO\] BUILD SUCCESS" mvn-docker-build.log; then
            echo "Docker Integration Tests BUILD not successful. Aborting."
            echo "::error::Docker Integration Tests BUILD not successful. Check artifacts for logs."
            exit 1
          fi
          # Also check there are no BUILD FAILURE lines.
          if grep -q "\[INFO\] BUILD FAILURE" mvn-docker-build.log; then
            echo "Docker Integration Tests had BUILD FAILURE. Aborting."
            echo "::error::Docker Integration Tests had BUILD FAILURE. Check artifacts for logs."
            exit 1
          fi

          echo ""
          echo "=========================================================="
          echo "Docker Integration Tests completed"
          echo "=========================================================="
          echo ""
      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-integration-test-logs
          path: |
            modules/integration/**/target/surefire-reports/
            modules/integration/**/mvn-docker-build.log
